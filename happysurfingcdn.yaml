proxy-groups:
- name: CONTROL
  type: select
  proxies:
  - URLTEST
  - SELECT
  url: http://www.gstatic.com/generate_204

- name: SELECT
  type: select
  use:
  - Airuopcdn
  - WilliamStar007cdn
  - anaercdn
  - mahdiblandcdn
  - peasoftcdn
  - tbbatbbcdn
  - MrMohebicdn
  - chengaopancdn  
  url: http://www.gstatic.com/generate_204

- name: URLTEST
  type: url-test
  use:
  - Airuopcdn
  - WilliamStar007cdn
  - anaercdn
  - mahdiblandcdn
  - peasoftcdn
  - tbbatbbcdn
  - MrMohebicdn
  - chengaopancdn
  url: http://www.gstatic.com/generate_204
  interval: 120



rule-providers:
  rule_nsfwp:
    type: http
    behavior: domain
    url: https://dl.dropboxusercontent.com/s/t426sctp3f7s5jq5jxooq/rule_nsfwp.yaml?rlkey=g3ntld4akarr0yl4k0fjpf07v
    path: "./rule_provider/rule_nsfwp.yaml"
    interval: 86400
  rule_nsfwn:
